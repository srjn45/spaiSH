# spai configuration
# Written by `spai init`. Copy to ~/.config/spaish/spaid.toml to edit by hand.

[provider]
# Remote provider kind: "anthropic" (native) or "openai" (OpenAI-compatible).
kind = "anthropic"
# Endpoint — only needed for kind = "openai" (include /v1).
endpoint = ""
# Environment variable name that holds your API key (never put the key here).
api_key_env = "ANTHROPIC_API_KEY"
# Model name.
model = "claude-opus-4-8"

[local]
# Ollama endpoint (used with prefer_local = true or `spai --local`).
ollama_endpoint = "http://localhost:11434"
# Local model to use via Ollama.
local_model = "qwen2.5-coder:7b"

[routing]
# Set to true to always use the local model (full privacy mode).
prefer_local = false

[permissions]
# Seconds before an elevated (sudo) approval expires and must be re-confirmed.
sudo_session_timeout = 300

# Configurable policy layer, resolved before the built-in tier-based confirm
# gate. Everything below is optional — an empty [permissions] section reproduces
# the default behavior exactly. Each policy value is one of:
#   allow   — run without confirmation, even in manual mode
#   confirm — keep the default tier-based behavior (and, as an explicit entry,
#             override a broader "allow", e.g. a per-server allow)
#   deny    — never execute, in any mode (auto included); the tool call is
#             reported back to the model as an error and the loop continues
#
# Resolution precedence, highest first:
#   1. per-tool entry ([permissions.tools])
#   2. per-MCP-server entry ([permissions.mcp_servers], for mcp__<server>__* tools)
#   3. bash allow_commands prefix match (for the bash tool)
#   4. default tier-based behavior
#
# Bash command prefixes that bypass confirmation when the classified command
# matches on a word boundary (e.g. "git status" matches "git status -s").
# allow_commands = ["git status", "git diff", "go test", "go build"]
#
# Per-tool policy: tool name -> allow | confirm | deny.
# [permissions.tools]
# read_file = "allow"
# write_file = "confirm"
# bash = "confirm"
#
# Per-MCP-server policy: server name (the <server> in mcp__<server>__<tool>) ->
# allow | confirm | deny. Applies to all of that server's tools; an explicit
# [permissions.tools] entry for a specific mcp__* tool wins over this default.
# [permissions.mcp_servers]
# filesystem = "allow"
# git = "confirm"

[agent]
# Default to auto mode (run tool calls without confirmation).
autonomous = false
# Maximum tool-calling iterations per request.
max_iterations = 25
# Verbose tool output.
verbose = false

# External MCP (Model Context Protocol) servers. Each server is spawned over
# stdio and its tools are exposed to the model as mcp__<name>__<tool>. They are
# treated as Write-tier and confirmed in manual mode. A server that fails to
# start or handshake is logged and skipped — spai still runs without it.
# Declare one [[mcp.servers]] block per server:
#
# [[mcp.servers]]
# name = "filesystem"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem", "/some/dir"]
# # env = ["KEY=VALUE"]   # optional extra environment variables
#
# [[mcp.servers]]
# name = "git"
# command = "uvx"
# args = ["mcp-server-git", "--repository", "/path/to/repo"]
